<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>残高くん | プライバシーポリシー</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --paper: #fffdf9;
      --text: #13211f;
      --muted: #5d6d6a;
      --line: rgba(19, 33, 31, 0.1);
      --brand: #10a36d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(16, 163, 109, 0.12), transparent 20rem),
        var(--bg);
      line-height: 1.9;
    }

    a {
      color: var(--brand);
    }

    .wrap {
      width: min(calc(100% - 32px), 840px);
      margin: 48px auto;
      padding: 32px;
      border-radius: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(19, 33, 31, 0.06);
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    h2 {
      margin: 32px 0 12px;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 18px;
    }

    .back {
      display: inline-flex;
      margin-top: 18px;
      color: var(--muted);
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .wrap {
        margin: 24px auto;
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">

</html>
